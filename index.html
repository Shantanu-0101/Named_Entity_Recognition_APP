<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Named Entitiy Recognition App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <h1 class="text-center">Named Entity Recognition App</h1>
    <div class="container bg-dark">
        <form action="/entity" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="text"> Upload file</label>
                <input type="file" name="file" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary mt-2">Get Entities</button>
        </form>
    </div>

    <div class="container">
        {% if html and text %}
        <p>Original Text: <br>{{text|safe}}</p>
        <p>Entity Text: <br>{{html|safe}}</p>
        {% endif %}
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
